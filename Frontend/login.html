<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Healthcare Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #cfe9ff, #e6f7ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* MAIN CONTAINER */
.container {
    display: flex;
    width: 800px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #0077ff, #00aaff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.left img {
    width: 80%;
    border-radius: 20px;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    padding: 30px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #00aaff, #0077ff);
    color: white;
    cursor: pointer;
}

/* GOOGLE BUTTON */
.google-btn {
    background: white;
    color: black;
    border: 1px solid #ccc;
    margin-top: 10px;
}

.google-btn img {
    width: 18px;
    vertical-align: middle;
    margin-right: 8px;
}

.link {
    color: #0077ff;
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE IMAGE -->
    <div class="left">
        <img src="https://img.freepik.com/free-photo/doctor-with-stethoscope-hands-hospital-background_1423-1.jpg">
    </div>

    <!-- RIGHT SIDE LOGIN -->
    <div class="right">

        <h2>Welcome to AI Healthcare Portal</h2>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <!-- 🔥 GOOGLE LOGIN BUTTON -->
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
            Sign in with Google
        </button>

        <p class="link" onclick="forgotPassword()">Forgot Password?</p>

        <p id="msg"></p>

    </div>

</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(email === "" || pass === "") {
        document.getElementById("msg").innerHTML = "❌ Fill all fields";
        return;
    }

    document.getElementById("msg").innerHTML = "✅ Login Successful!";

    setTimeout(() => {
        window.location.href = "language.html";
    }, 1000);
}

// 🔥 GOOGLE LOGIN (DEMO)
function googleLogin() {
    alert("Google Login Coming Soon 🚀");

    // later we will connect Firebase here
}

function forgotPassword() {
    alert("Reset link sent to your email (demo)");
}
</script>

</body>
</html>
