<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Healthcare Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #cfe9ff, #e6f7ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Inputs */

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Buttons */

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #00aaff, #0077ff);
    color: white;
    cursor: pointer;
}

/* Links */

.link {
    color: #0077ff;
    font-size: 12px;
    cursor: pointer;
}

/* Animation icons */

.icons {
    font-size: 24px;
    animation: float 3s infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}
</style>

</head>

<body>

<div class="card">

    <div class="icons">🏥 ❤️ 🧬 💊</div>

     
    <h2>Welcome to AI Healthcare Portal</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
    <button onclick="emailLogin()">Login with Email</button>

    <p class="link" onclick="forgotPassword()">Forgot Password?</p>

    <p id="msg"></p>

</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(email === "" || pass === "") {
        document.getElementById("msg").innerHTML = "❌ Fill all fields";
        return;
    }

     document.getElementById("msg").innerHTML = "✅ Login Successful!";

    // Redirect to language page
    setTimeout(() => {
        window.location.href = "language.html";
    }, 1000);
}

function emailLogin() {
    alert("Redirect to Email Login (Firebase later)");
}

function forgotPassword() {
    alert("Reset link sent to your email (demo)");
}
</script>

</body>
</html>
